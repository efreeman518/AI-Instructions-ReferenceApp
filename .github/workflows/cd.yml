name: CD

# TODO: [CONFIGURE] Re-enable after adding NUGET_PAT secret for GitHub Packages feed auth
# on:
#   push:
#     branches: [main]
#   workflow_dispatch:
#     inputs:
#       environment:
#         type: choice
#         options: [dev, staging, prod]
#         default: dev
#         description: "Target environment"
on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, staging, prod]
        default: dev
        description: "Target environment (disabled until NuGet PAT configured)"

permissions:
  id-token: write
  contents: read

env:
  SOLUTION_PATH: src/TaskFlow.slnx

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: src/global.json

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration Release

      - name: Unit + Architecture Tests
        run: >
          dotnet test ${{ env.SOLUTION_PATH }}
          --no-build --configuration Release
          --filter "TestCategory=Unit|TestCategory=Architecture"

  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: taskflow-api
            dockerfile: src/Host/TaskFlow.Api/Dockerfile
          - name: taskflow-gateway
            dockerfile: src/Host/TaskFlow.Gateway/Dockerfile
          - name: taskflow-scheduler
            dockerfile: src/Host/TaskFlow.Scheduler/Dockerfile
          - name: taskflow-functions
            dockerfile: src/Host/TaskFlow.Functions/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and Push
        run: |
          docker build \
            --build-arg NUGET_TOKEN=${{ secrets.NUGET_TOKEN }} \
            -t ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.name }}:${{ github.sha }} \
            -t ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.name }}:latest \
            -f ${{ matrix.dockerfile }} .

          docker push ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.name }}:${{ github.sha }}
          docker push ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.name }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy (placeholder)
        run: |
          echo "Deploying to ${{ github.event.inputs.environment || 'dev' }}"
          echo "Image tag: ${{ github.sha }}"
          # Add deployment commands (Container Apps, App Service, etc.)
