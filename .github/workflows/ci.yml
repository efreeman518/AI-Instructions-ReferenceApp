name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      includeE2E:
        type: boolean
        default: false
        description: "Run Test.E2E SQL-backed HTTP workflow tests (requires Docker)"
      includeIntegration:
        type: boolean
        default: false
        description: "Run Test.Integration component tests (standalone Testcontainers SQL + Azurite; requires Docker)"
      includeAspireMesh:
        type: boolean
        default: false
        description: "Run Test.Aspire distributed-app mesh tests (full AppHost graph; requires Docker)"
      includeFoundryLocal:
        type: boolean
        default: false
        description: "Run Test.FoundryLocal live local model smoke tests (RID-bound; may download model assets)"
      includePlaywrightUI:
        type: boolean
        default: false
        description: "Run Test.PlaywrightUI browser smoke tests (requires browser install; starts Aspire AppHost)"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Aspire/Integration tests pull several large container images (two SQL Server tags, azurite,
      # service bus emulator, redis). The hosted runner's ~14 GB free disk overflows mid-pull
      # ("no space left on device"), which surfaces as an AppHost resource-wait TimeoutException.
      # Reclaim ~20+ GB (Android SDK, Haskell, large apt packages) before the Docker-backed steps run.
      # Keep dotnet and the tool cache - the build depends on them.
      - name: Free disk space
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.includeE2E || inputs.includeIntegration || inputs.includeAspireMesh || inputs.includeFoundryLocal || inputs.includePlaywrightUI) }}
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          dotnet: false
          android: true
          haskell: true
          large-packages: true
          swap-storage: false

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: src/global.json

      - name: Install required workloads
        run: dotnet workload install wasm-tools aspire

      - name: Configure private NuGet feed
        env:
          NUGET_PAT: ${{ secrets.NUGET_PAT }}
        run: |
          if [ -z "$NUGET_PAT" ]; then
            echo "::error::NUGET_PAT secret is required to restore EF.* packages from GitHub Packages."
            exit 1
          fi

          dotnet nuget update source efreeman518-github \
            --configfile src/nuget.config \
            --username github-actions \
            --password "$NUGET_PAT" \
            --store-password-in-clear-text

      - name: Restore
        run: dotnet restore src/TaskFlow.slnx

      - name: Build
        # Static web assets writes shared obj caches and can race when the same web project is in
        # the solution and referenced by AppHost.
        run: dotnet build src/TaskFlow.slnx --no-restore --configuration Release -m:1

      - name: Unit Tests
        run: >
          dotnet test src/Test/Test.Unit/Test.Unit.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=unit-results.trx"
          --results-directory ./TestResults

      - name: Architecture Tests
        run: >
          dotnet test src/Test/Test.Architecture/Test.Architecture.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=arch-results.trx"
          --results-directory ./TestResults

      - name: Endpoint Tests
        run: >
          dotnet test src/Test/Test.Endpoints/Test.Endpoints.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=endpoint-results.trx"
          --results-directory ./TestResults

      - name: FlowEngine Definition Tests
        run: >
          dotnet test src/Test/Test.Integration.FlowEngine/Test.Integration.FlowEngine.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=flowengine-results.trx"
          --results-directory ./TestResults

      - name: E2E Tests (manual, SQL)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.includeE2E == true }}
        timeout-minutes: 20
        run: >
          dotnet test src/Test/Test.E2E/Test.E2E.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=e2e-results.trx"
          --results-directory ./TestResults

      - name: Integration Tests (manual, component)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.includeIntegration == true }}
        timeout-minutes: 20
        run: >
          dotnet test src/Test/Test.Integration/Test.Integration.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=integration-results.trx"
          --results-directory ./TestResults

      - name: Aspire Mesh Tests (manual, full graph)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.includeAspireMesh == true }}
        timeout-minutes: 30
        run: >
          dotnet test src/Test/Test.Aspire/Test.Aspire.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=aspire-results.trx"
          --results-directory ./TestResults

      - name: Foundry Local Tests (manual, live local)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.includeFoundryLocal == true }}
        timeout-minutes: 40
        run: >
          dotnet test src/Test/Test.FoundryLocal/Test.FoundryLocal.csproj
          --no-build --configuration Release
          --filter TestCategory=FoundryLocal
          --logger "trx;LogFileName=foundrylocal-results.trx"
          --results-directory ./TestResults

      - uses: actions/setup-node@v4
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.includePlaywrightUI == true }}
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            src/Test/Test.PlaywrightUI/package-lock.json
            src/UI/TaskFlow.React/package-lock.json

      - name: Restore Playwright packages
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.includePlaywrightUI == true }}
        run: |
          npm ci --prefix src/Test/Test.PlaywrightUI
          npm ci --prefix src/UI/TaskFlow.React

      - name: Install Playwright browser
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.includePlaywrightUI == true }}
        shell: pwsh
        run: |
          ./src/Test/Test.PlaywrightUI/bin/Release/net10.0/playwright.ps1 install chromium
          npx --prefix src/Test/Test.PlaywrightUI playwright install --with-deps chromium

      - name: Playwright UI Tests (manual, browser)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.includePlaywrightUI == true }}
        timeout-minutes: 40
        run: >
          dotnet test src/Test/Test.PlaywrightUI/Test.PlaywrightUI.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=playwrightui-results.trx"
          --results-directory ./TestResults

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/*.trx

  # TODO: Enable auto-deploy after running bootstrap.ps1 and configuring GitHub secrets/variables.
  # Remove workflow_dispatch from deploy.yml once this is enabled - manual trigger won't be needed.
