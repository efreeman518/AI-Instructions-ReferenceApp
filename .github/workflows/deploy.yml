name: Deploy TaskFlow

on:
  workflow_call:      # Called by CI on main after tests pass
  workflow_dispatch:  # Manual trigger

permissions:
  id-token: write   # OIDC token for Azure login
  contents: read     # Checkout code
  packages: write    # Push to ghcr.io

env:
  REGISTRY: ghcr.io
  RESOURCE_PREFIX: taskflow
  ENVIRONMENT_NAME: dev

jobs:
  build-and-push:
    name: Build & Push Container Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "version=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Gateway
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Host/TaskFlow.Gateway/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/taskflow-gateway:${{ steps.meta.outputs.version }}
          build-args: NUGET_TOKEN=${{ secrets.NUGET_PAT }}

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Host/TaskFlow.Api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/taskflow-api:${{ steps.meta.outputs.version }}
          build-args: NUGET_TOKEN=${{ secrets.NUGET_PAT }}

      - name: Build & push Scheduler
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Host/TaskFlow.Scheduler/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/taskflow-scheduler:${{ steps.meta.outputs.version }}
          build-args: NUGET_TOKEN=${{ secrets.NUGET_PAT }}

      - name: Build & push Blazor
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/UI/TaskFlow.Blazor/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/taskflow-blazor:${{ steps.meta.outputs.version }}
          build-args: NUGET_TOKEN=${{ secrets.NUGET_PAT }}

  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev
    outputs:
      resource-group: ${{ steps.deploy.outputs.resourceGroupName }}
      function-app-name: ${{ steps.deploy.outputs.functionAppName }}
      swa-name: ${{ steps.deploy.outputs.staticWebAppName }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: eastus2
          template: ./infra/main.bicep
          parameters: >-
            resourcePrefix=${{ env.RESOURCE_PREFIX }}
            environmentName=${{ env.ENVIRONMENT_NAME }}
            location=eastus2
            sqlAdminPrincipalId=${{ secrets.SQL_ADMIN_PRINCIPAL_ID }}
            sqlAdminPrincipalName=${{ secrets.SQL_ADMIN_PRINCIPAL_NAME }}
            sqlAdminPrincipalType=User
            gatewayImage=${{ env.REGISTRY }}/${{ github.repository_owner }}/taskflow-gateway:${{ needs.build-and-push.outputs.image-tag }}
            apiImage=${{ env.REGISTRY }}/${{ github.repository_owner }}/taskflow-api:${{ needs.build-and-push.outputs.image-tag }}
            schedulerImage=${{ env.REGISTRY }}/${{ github.repository_owner }}/taskflow-scheduler:${{ needs.build-and-push.outputs.image-tag }}
            blazorImage=${{ env.REGISTRY }}/${{ github.repository_owner }}/taskflow-blazor:${{ needs.build-and-push.outputs.image-tag }}

  deploy-functions:
    name: Deploy Functions
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-infra]
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Configure private NuGet feed
        env:
          NUGET_PAT: ${{ secrets.NUGET_PAT }}
        if: env.NUGET_PAT != ''
        run: |
          dotnet nuget update source efreeman518-github \
            --configfile src/nuget.config \
            --username github-actions \
            --password "$NUGET_PAT" \
            --store-password-in-clear-text

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build Functions
        run: |
          dotnet publish src/Host/TaskFlow.Functions/TaskFlow.Functions.csproj \
            --configuration Release \
            --output ./functions-output

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ needs.deploy-infra.outputs.function-app-name }}
          package: ./functions-output

  deploy-uno:
    name: Deploy Uno WASM (Static Web App)
    runs-on: ubuntu-latest
    needs: [deploy-infra]
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Configure private NuGet feed
        env:
          NUGET_PAT: ${{ secrets.NUGET_PAT }}
        if: env.NUGET_PAT != ''
        run: |
          dotnet nuget update source efreeman518-github \
            --configfile src/nuget.config \
            --username github-actions \
            --password "$NUGET_PAT" \
            --store-password-in-clear-text

      - name: Build Uno WASM
        run: |
          dotnet publish src/UI/TaskFlow.Uno/TaskFlow.Uno.csproj \
            -f net10.0-browserwasm \
            -c Release \
            -o ./uno-output

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get SWA deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name ${{ needs.deploy-infra.outputs.swa-name }} \
            --resource-group ${{ needs.deploy-infra.outputs.resource-group }} \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          action: upload
          app_location: ./uno-output/wwwroot
          skip_app_build: true
          skip_api_build: true

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-infra, deploy-functions, deploy-uno]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Infrastructure | ${{ needs.deploy-infra.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Functions | ${{ needs.deploy-functions.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Uno WASM (SWA) | ${{ needs.deploy-uno.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Resource Group: \`${{ needs.deploy-infra.outputs.resource-group }}\`" >> $GITHUB_STEP_SUMMARY
